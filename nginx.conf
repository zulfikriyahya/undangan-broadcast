server {
    listen 80;
    listen [::]:80;
    server_name undangan.zedlabs.id;

    # Redirect HTTP → HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name undangan.zedlabs.id;

    # ── SSL (ganti path sesuai hasil certbot) ─────────────────────────
    ssl_certificate     /etc/letsencrypt/live/undangan.zedlabs.id/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/undangan.zedlabs.id/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # ── Logging ────────────────────────────────────────────────────────
    access_log /var/log/nginx/undangan.zedlabs.id.access.log;
    error_log  /var/log/nginx/undangan.zedlabs.id.error.log warn;

    # ── Keamanan dasar ─────────────────────────────────────────────────
    add_header X-Content-Type-Options  "nosniff"       always;
    add_header X-Frame-Options         "SAMEORIGIN"    always;
    add_header X-XSS-Protection        "1; mode=block" always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/javascript application/javascript
                    application/json image/svg+xml font/woff2;

    # ── Static files — public/ ─────────────────────────────────────────
    # Sesuaikan root ke direktori hasil build Astro Anda
    root /var/www/undangan.zedlabs.id/dist/client;

    # Service Worker — tidak boleh di-cache oleh browser
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma        "no-cache";
        expires 0;
        try_files $uri =404;
    }

    # Web Manifest
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Aset statis (JS/CSS/font/gambar di /_astro/) — cache panjang karena
    # Astro memberi nama file dengan content hash
    location /_astro/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # Upload foto/kartu yang disimpan di public/uploads/
    location /uploads/ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Icon PWA
    location /icons/ {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
    }

    # Favicon
    location = /favicon.ico {
        add_header Cache-Control "public, max-age=604800";
        try_files $uri =404;
        log_not_found off;
    }

    # ── Semua request lain → Astro Node standalone ─────────────────────
    # Astro standalone default port: 4321 (sesuaikan jika beda)
    location / {
        proxy_pass         http://127.0.0.1:4321;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";

        proxy_read_timeout  60s;
        proxy_send_timeout  60s;
        proxy_connect_timeout 10s;

        # Buffer — matikan agar streaming SSR tidak tertahan
        proxy_buffering off;

        # Upload foto anak bisa cukup besar
        client_max_body_size 10M;
    }
}
